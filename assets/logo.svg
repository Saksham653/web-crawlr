<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" width="480" height="160">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3f8066" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#3f8066" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9077c5" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#9077c5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mask-grad" cx="50%" cy="50%" r="50%">
      <stop offset="20%" stop-color="white"/>
      <stop offset="100%" stop-color="black"/>
    </radialGradient>
    <mask id="fade-mask">
      <rect width="480" height="160" fill="url(#mask-grad)"/>
    </mask>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.8" fill="#222222"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="480" height="160" fill="#070707" rx="12"/>

  <!-- Dot grid -->
  <rect width="480" height="160" fill="url(#dots)" mask="url(#fade-mask)" opacity="0.7"/>

  <!-- Glow orbs -->
  <ellipse cx="240" cy="60" rx="280" ry="120" fill="url(#glow)"/>
  <ellipse cx="400" cy="130" rx="160" ry="80" fill="url(#glow2)"/>

  <!-- Spider web accent lines left -->
  <line x1="30" y1="18" x2="82" y2="80" stroke="#3f8066" stroke-width="0.7" opacity="0.35"/>
  <line x1="82" y1="80" x2="30" y2="142" stroke="#3f8066" stroke-width="0.7" opacity="0.35"/>
  <line x1="82" y1="80" x2="148" y2="80" stroke="#3f8066" stroke-width="0.5" opacity="0.25"/>
  <line x1="30" y1="18" x2="148" y2="80" stroke="#3f8066" stroke-width="0.4" opacity="0.15"/>

  <!-- Spider web accent lines right -->
  <line x1="450" y1="18" x2="398" y2="80" stroke="#9077c5" stroke-width="0.7" opacity="0.3"/>
  <line x1="398" y1="80" x2="450" y2="142" stroke="#9077c5" stroke-width="0.7" opacity="0.3"/>
  <line x1="398" y1="80" x2="332" y2="80" stroke="#9077c5" stroke-width="0.5" opacity="0.2"/>
  <line x1="450" y1="18" x2="332" y2="80" stroke="#9077c5" stroke-width="0.4" opacity="0.12"/>

  <!-- Badge pill -->
  <rect x="160" y="13" width="160" height="20" rx="10" fill="rgba(63,128,102,0.09)" stroke="#3f8066" stroke-width="0.8" stroke-opacity="0.25"/>
  <circle cx="173" cy="23" r="3" fill="#3f8066"/>
  <text x="182" y="27.5" font-family="'Courier New', monospace" font-size="8.5" letter-spacing="2.5" fill="#3f8066" text-anchor="start">UNIVERSAL SCRAPER</text>

  <!-- Main wordmark: "Crawl" -->
  <text x="108" y="114" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" fill="#edebe4" letter-spacing="-3" text-anchor="middle">Crawl</text>

  <!-- Italic "r" in teal -->
  <text x="311" y="114" font-family="Georgia, serif" font-size="72" font-style="italic" font-weight="600" fill="#72bba0" text-anchor="middle">r</text>

  <!-- Cursor block -->
  <rect x="335" y="88" width="6" height="16" fill="#72bba0" rx="1" opacity="0.9"/>

  <!-- Decorative dots -->
  <circle cx="62" cy="95" r="2.5" fill="#72bba0" opacity="0.5"/>
  <circle cx="418" cy="95" r="2.5" fill="#72bba0" opacity="0.5"/>

  <!-- Bottom tagline -->
  <text x="240" y="150" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" letter-spacing="2.2" fill="#595959">BROWSER · PYTHON · ZERO DEPS · 4 EXPORT FORMATS</text>

  <!-- Top hairline border glow -->
  <rect x="1" y="1" width="478" height="158" rx="11.5" fill="none" stroke="#3f8066" stroke-width="0.6" stroke-opacity="0.2"/>
</svg>
